<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.S. Border Crossings 1996–2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111814;color:#e8f2c7;font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{padding:10px 20px;border-bottom:1px solid #1e2e1e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-size:clamp(12px,1.8vw,15px);font-weight:600;color:#e8f2c7;letter-spacing:-0.01em}
header p{font-size:10px;color:#3a5a3a;font-family:'DM Mono',monospace}
.main{display:grid;grid-template-columns:1fr 300px;flex:1;overflow:hidden;min-height:0}
#map-wrap{position:relative;overflow:hidden}
#map-svg{width:100%;height:100%}
.state-path{fill:#192419;stroke:#22342200;stroke-width:0.4}
.state-path-border{fill:none;stroke:#243824;stroke-width:0.5}
.port-dot{cursor:pointer}
.sidebar{display:flex;flex-direction:column;border-left:1px solid #1a2a1a;overflow:hidden}
#ctrl{padding:14px 16px;border-bottom:1px solid #1a2a1a;flex-shrink:0;background:#0f1a0f}
.date-display{font-family:'DM Mono',monospace;line-height:1;margin-bottom:8px}
.date-month{font-size:1.4rem;font-weight:500;color:#8da88d}
.date-year{font-size:2.8rem;font-weight:500;color:#8da88d;line-height:1}s
.era-pill{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:2px 9px;border-radius:16px;display:inline-block;margin-bottom:10px}
.era-boom{background:#1a341a;color:#8da88d}
.era-decline{background:#341a1a;color:#c47c7c}
.era-prolong{background:#1a2a34;color:#7cb0c4}
.era-covid{background:#34301a;color:#c4b87c}
.era-rebound{background:#1a341a;color:#8da88d}
.era-policy{background:#341a1a;color:#c47c7c}
.scrub-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:#1a2a1a;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#8da88d;cursor:pointer}
.yr-lbl{font-family:'DM Mono',monospace;font-size:9px;color:#2a3a2a;min-width:26px}
.btns{display:flex;gap:6px;margin-bottom:8px}
button{font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 12px;border-radius:14px;border:1px solid #2a3a2a;background:transparent;color:#8da88d;cursor:pointer;transition:all 0.15s}
button:hover{background:#1a2a1a;color:#e8f2c7}
button.active{background:#8da88d;color:#111814;border-color:#8da88d}
.spd-row{display:flex;gap:4px;align-items:center}
.spd-lbl{font-size:9px;color:#2a3a2a;font-family:'DM Mono',monospace;margin-right:4px}
.spd-btn{padding:3px 8px;font-size:9px}
.spd-btn.active{background:#4a6741;color:#e8f2c7;border-color:#4a6741}
.legend-row{display:flex;gap:10px;margin-top:8px;align-items:center}
.lg-item{display:flex;align-items:center;gap:4px;font-size:9px;font-family:'DM Mono',monospace;color:#3a5a3a}
.lg-c{border-radius:50%;flex-shrink:0}
#port-list-wrap{flex:1;overflow-y:auto;padding:8px 12px;background:#0d150d;min-height:0}
#port-list-wrap h3{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#2a3a2a;margin-bottom:6px}
.p-row{display:flex;align-items:center;gap:7px;padding:4px 3px;border-bottom:1px solid #111a11;cursor:pointer;border-radius:3px;transition:background 0.1s}
.p-row:hover,.p-row.sel{background:#182418}
.p-name{font-size:11px;color:#b0c8b0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-val{font-family:'DM Mono',monospace;font-size:10px;color:#8da88d;min-width:46px;text-align:right}
#chart-wrap{padding:8px 12px 12px;border-top:1px solid #1a2a1a;background:#0a120a;flex-shrink:0}
#chart-wrap h3{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#2a3a2a;margin-bottom:4px}
#chart-title{color:#8da88d;font-size:11px;margin-bottom:3px;font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#port-chart{width:100%;height:130px}
.c-line{fill:none;stroke:#8da88d;stroke-width:1.5}
.c-area{fill:url(#cg)}
.c-dot{fill:#e8f2c7}
.c-vline{stroke:#e8f2c7;stroke-width:0.8;stroke-dasharray:3,3;opacity:0.5}
.ax text{font-family:'DM Mono',monospace;font-size:8px;fill:#2a3a2a}
.ax line,.ax path{stroke:#1a2a1a}
.tip{position:fixed;background:#182418;border:1px solid #2a3a2a;border-radius:6px;padding:6px 10px;font-size:11px;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:999}
.tip strong{display:block;color:#e8f2c7;font-size:12px;margin-bottom:2px}
.tip span{color:#8da88d;font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0a120a}
::-webkit-scrollbar-thumb{background:#1a2a1a;border-radius:2px}
  ::-webkit-scrollbar-thumb{background:#1a2a1a;border-radius:2px}
@media (max-width: 768px) {
  body { overflow-y: auto; overflow-x: hidden; height: auto; min-height: 100vh; }
  header { flex-wrap: wrap; gap: 6px; padding: 10px 14px; }
  header h1 { font-size: 13px; }
  header > div:last-child { display: none; }
  .main { display: flex; flex-direction: column; height: auto; overflow: visible; }
  #map-wrap { min-height: 60vw; width: 100%; }
  #map-svg { width: 100%; height: auto; }
  .sidebar { border-left: none; border-top: 1px solid #1a2a1a; width: 100%; overflow: visible; }
  #ctrl { padding: 12px 14px; }
  .date-year { font-size: 2.2rem; }
  .date-month { font-size: 1.1rem; }
  .btns { flex-wrap: wrap; }
  .spd-row { flex-wrap: wrap; }
  .legend-row { flex-wrap: wrap; }
  #port-list-wrap { max-height: 260px; overflow-y: auto; padding: 10px 14px; }
  .p-row { padding: 5px 4px; }
  .p-name { font-size: 12px; }
  .p-val { font-size: 11px; }
  #chart-wrap { padding: 10px 14px 20px; }
  #port-chart { width: 100%; height: 140px; }
  .tip { font-size: 12px; max-width: 200px; }
  input[type=range] { height: 6px; }
  input[type=range]::-webkit-slider-thumb { width: 18px; height: 18px; }
  button { padding: 6px 14px; font-size: 12px; }
  .spd-btn { padding: 4px 10px; font-size: 10px; }
}
</style>
</head>

668}];

// Build sorted list of all [year, month] timepoints
const tpSet = new Set(DATA.map(d => d.Year*100 + d.Month));
const TIMEPOINTS = [...tpSet].sort().map(v => ({year: Math.floor(v/100), month: v%100}));

const PORTS = [...new Set(DATA.map(d => d["Port.Name"]))];

// Index data by timepoint key
const byTP = {};
DATA.forEach(d => {
  const k = d.Year*100 + d.Month;
  if(!byTP[k]) byTP[k] = {};
  byTP[k][d["Port.Name"]] = {count: d.CrossingCount, lat: d.Latitude, lng: d.Longitude};
});

const maxCount = d3.max(DATA, d => d.CrossingCount);

const ERAS = [
  {min:199601, max:200109, label:"Pre-9/11 Boom", cls:"era-boom"},
  {min:200109, max:200801, label:"Post-9/11 Decline", cls:"era-decline"},
  {min:200801, max:202003, label:"Prolonged Decline", cls:"era-prolong"},
  {min:202003, max:202201, label:"COVID Crash", cls:"era-covid"},
  {min:202201, max:202501, label:"Rebound", cls:"era-rebound"},
  {min:202501, max:202700, label:"Policy Change", cls:"era-policy"}
];

function getEra(y,m){
  const k=y*100+m;
  return ERAS.find(e=>k>=e.min&&k<e.max)||ERAS[ERAS.length-1];
}

const proj = d3.geoAlbersUsa().scale(1300).translate([470, 290]);
const svg = d3.select("#map-svg");
const mapG = svg.append("g").attr("id","map-g");
const zoom = d3.zoom().scaleExtent([1,8]).on("zoom",(e)=>{mapG.attr("transform",e.transform)});
svg.call(zoom);
svg.on("dblclick.zoom",null);
svg.on("dblclick",()=>{svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity)});const tip = document.getElementById("tip");
let curIdx=0, playing=false, timer=null, selPort="San Ysidro", speedMs=120;

const sizeScale = d3.scaleSqrt().domain([0, maxCount]).range([2, 28]);
const colorScale = d3.scaleSequential().domain([0, maxCount])
  .interpolator(d3.interpolate("#d4e8c4", "#1a4a1a"));

function safeid(port){ return "pd-"+port.replace(/[^a-zA-Z0-9]/g,"-"); }

function initMap(){
  d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us => {
    const path = d3.geoPath().projection(proj);
    const states = topojson.feature(us, us.objects.states);
    mapG.append("g").selectAll("path")
    .data(states.features).join("path")
    .attr("class","state-path").attr("d",path);
    mapG.append("g").selectAll("path")
    .data(states.features).join("path")
    .attr("class","state-path-border").attr("d",path);

    PORTS.forEach(port => {
      const fd = DATA.find(d => d["Port.Name"]===port);
      if(!fd) return;
      const p = proj([fd.Longitude, fd.Latitude]);
      if(!p) return;
      mapG.append("circle")
        .attr("class","port-dot")
        .attr("id", safeid(port))
        .attr("cx",p[0]).attr("cy",p[1])
        .attr("r",3).attr("fill","#8da88d")
        .attr("stroke","rgba(232,242,199,0.4)").attr("stroke-width",0.5)
        .attr("opacity",0.85)
        .on("mouseover",(ev) => {
          const tp = TIMEPOINTS[curIdx];
          const d = byTP[tp.year*100+tp.month]?.[port];
          if(!d) return;
          tip.style.opacity="1";
          tip.style.left=(ev.clientX+14)+"px";
          tip.style.top=(ev.clientY-20)+"px";
          tip.innerHTML=`<strong>${port}</strong><span>${(d.count/1e6).toFixed(2)}M · ${MONTHS[tp.month-1]} ${tp.year}</span>`;
        })
        .on("mousemove",(ev) => {
          tip.style.left=(ev.clientX+14)+"px";
          tip.style.top=(ev.clientY-20)+"px";
        })
        .on("mouseout",() => { tip.style.opacity="0"; })
        .on("click",() => { selPort=port; drawChart(port); highlightRow(port); });
    });

    update(0);
    drawChart("San Ysidro");
  }).catch(() => { update(0); drawChart("San Ysidro"); });
}

function update(idx){
  curIdx = idx;
  const tp = TIMEPOINTS[idx];
  const k = tp.year*100+tp.month;
  const ydata = byTP[k] || {};

  document.getElementById("dm").textContent = MONTHS[tp.month-1];
  document.getElementById("dy").textContent = tp.year;
  document.getElementById("pdate").textContent = MONTHS[tp.month-1]+" "+tp.year;
  document.getElementById("scrub").value = idx;

  const era = getEra(tp.year, tp.month);
  const el = document.getElementById("era");
  el.textContent = era.label; el.className = "era-pill "+era.cls;

  PORTS.forEach(port => {
    const c = document.getElementById(safeid(port));
    if(!c) return;
    const d = ydata[port];
    if(!d){ d3.select(c).transition().duration(80).attr("r",0); return; }
    d3.select(c).transition().duration(80)
      .attr("r", sizeScale(d.count))
      .attr("fill", colorScale(d.count))
      .attr("opacity", 0.88);
  });

  const sorted = Object.entries(ydata).sort((a,b)=>b[1].count-a[1].count).slice(0,12);
  const list = document.getElementById("plist");
  list.innerHTML = "";
  sorted.forEach(([port, d]) => {
    const row = document.createElement("div");
    row.className = "p-row"+(port===selPort?" sel":"");
    row.id = "pr-"+port.replace(/[^a-zA-Z0-9]/g,"-");
    row.innerHTML = `<div style="width:${4+d.count/maxCount*10}px;height:${4+d.count/maxCount*10}px;background:${colorScale(d.count)};border-radius:50%;flex-shrink:0"></div><div class="p-name">${port}</div><div class="p-val">${(d.count/1e6).toFixed(2)}M</div>`;
    row.addEventListener("click", () => { selPort=port; drawChart(port); highlightRow(port); });
    list.appendChild(row);
  });

  if(selPort) drawChart(selPort);
}

function highlightRow(port){
  document.querySelectorAll(".p-row").forEach(r=>r.classList.remove("sel"));
  const r = document.getElementById("pr-"+port.replace(/[^a-zA-Z0-9]/g,"-"));
  if(r) r.classList.add("sel");
}

function drawChart(port){
  document.getElementById("chart-title").textContent = port;
  const cs = document.getElementById("port-chart");
  const cw = cs.getBoundingClientRect().width || 260;
  const ch = 130;
  const m = {top:6, right:6, bottom:18, left:32};
  const w = cw-m.left-m.right, h = ch-m.top-m.bottom;

function drawChart(port){
  document.getElementById("chart-title").textContent = port;
  const cs = document.getElementById("port-chart");
  const cw = cs.getBoundingClientRect().width || 260;
  const ch = 130;
  const m = {top:6, right:6, bottom:18, left:32};
  const w = cw-m.left-m.right, h = ch-m.top-m.bottom;

  // Use monthly data to match sidebar values
  const pd = DATA.filter(d=>d["Port.Name"]===port)
    .map(d=>({t: d.Year + (d.Month-1)/12, count: d.CrossingCount}))
    .sort((a,b)=>a.t-b.t);

  const x = d3.scaleLinear().domain([1996,2026.1]).range([0,w]);
  const y = d3.scaleLinear().domain([0, d3.max(pd,d=>d.count)*1.1]).range([h,0]);

  const sv = d3.select(cs);
  sv.selectAll("*:not(defs)").remove();
  const g = sv.append("g").attr("transform",`translate(${m.left},${m.top})`);

  g.append("path").datum(pd).attr("class","c-area")
    .attr("d", d3.area().x(d=>x(d.t)).y0(h).y1(d=>y(d.count)).curve(d3.curveMonotoneX));
  g.append("path").datum(pd).attr("class","c-line")
    .attr("d", d3.line().x(d=>x(d.t)).y(d=>y(d.count)).curve(d3.curveMonotoneX));

  // Current time marker
  const tp = TIMEPOINTS[curIdx];
  const curT = tp.year + (tp.month-1)/12;
  const cx = x(curT);
  g.append("line").attr("class","c-vline").attr("x1",cx).attr("x2",cx).attr("y1",0).attr("y2",h);

  const cp = pd.find(d=>Math.abs(d.t - curT)<0.01);
  if(cp) g.append("circle").attr("class","c-dot").attr("cx",x(cp.t)).attr("cy",y(cp.count)).attr("r",3.5);

  g.append("g").attr("class","ax").attr("transform",`translate(0,${h})`)
    .call(d3.axisBottom(x).tickValues([1996,2001,2008,2020,2026]).tickFormat(d3.format("d")).tickSize(3));
  g.append("g").attr("class","ax")
    .call(d3.axisLeft(y).ticks(3).tickFormat(d=>(d/1e6).toFixed(1)+"M").tickSize(3));
}
// Speed buttons
document.querySelectorAll(".spd-btn").forEach(btn => {
  btn.addEventListener("click", function(){
    document.querySelectorAll(".spd-btn").forEach(b=>b.classList.remove("active"));
    this.classList.add("active");
    speedMs = +this.dataset.ms;
    if(playing){
      clearInterval(timer);
      timer = setInterval(tick, speedMs);
    }
  });
});

function tick(){
  if(curIdx >= TIMEPOINTS.length-1){
    clearInterval(timer); playing=false;
    document.getElementById("play").textContent="▶ Play";
    document.getElementById("play").classList.remove("active");
    return;
  }
  update(curIdx+1);
}

document.getElementById("scrub").setAttribute("max", TIMEPOINTS.length-1);
document.getElementById("scrub").addEventListener("input", e => update(+e.target.value));

document.getElementById("play").addEventListener("click", function(){
  if(playing){
    clearInterval(timer); playing=false;
    this.textContent="▶ Play"; this.classList.remove("active");
  } else {
    playing=true; this.textContent="⏸ Pause"; this.classList.add("active");
    timer = setInterval(tick, speedMs);
  }
});

document.getElementById("reset").addEventListener("click", () => {
  clearInterval(timer); playing=false;
  document.getElementById("play").textContent="▶ Play";
  document.getElementById("play").classList.remove("active");
  update(0);
});

initMap();
</script>
